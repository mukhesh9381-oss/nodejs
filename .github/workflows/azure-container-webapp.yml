name: NodeJs

on:
  push:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

        node-version:
          - 18
          - 20
          - 22

        exclude:
          - os: windows-latest
            node-version: 22



jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key:  ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-1
          path: |
             package*

      - name: Deploy
        run: echo "Deploying to production server..."
